<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechCollect ROI Calculator</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #150d5d, #1c1278);
  margin: 0;
  padding: 40px 20px;
  color: #111;
}

.container {
  max-width: 640px;
  margin: auto;
  background: white;
  border-radius: 18px;
  padding: 36px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}

h1 {
  font-size: 26px;
  margin-bottom: 10px;
  color: #0d0a3d;
}

p {
  color: #555;
  line-height: 1.6;
  margin-bottom: 25px;
}

.input-group {
  margin-bottom: 18px;
}

label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 6px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: 2px solid #e5e7eb;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 15px;
  background: #150d5d;
  color: white;
  font-weight: 700;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #1c1278;
}

.results {
  margin-top: 30px;
}

.result {
  margin-bottom: 18px;
}

.result-label {
  font-size: 13px;
  color: #666;
}

.result-value {
  font-size: 24px;
  font-weight: 800;
  color: #0d0a3d;
}
</style>
</head>

<body>

<div class="container">

  <h1>Example Community Savings</h1>

  <p>
    To see how much a typical community will save, enter the number of units and its current annual budget for collections.
    We’ll compare industry-standard outcomes against TechCollect’s modeled resolution rates to estimate annual savings.
  </p>

  <div class="input-group">
    <label>Number of Units in Community</label>
    <input type="number" id="units" placeholder="e.g. 250">
  </div>

  <div class="input-group">
    <label>Annual Collections Budget ($)</label>
    <input type="number" id="budget" placeholder="e.g. 50000">
  </div>

  <button onclick="calculate()">Calculate Savings</button>

  <div class="results" id="results"></div>

</div>

<script>
const INDUSTRY_RATE = 0.48;
const TECHCOLLECT_RATE = 0.90;

function calculate() {
  const units = parseFloat(document.getElementById('units').value);
  const budget = parseFloat(document.getElementById('budget').value);

  if (!units || !budget) {
    alert("Please enter both values");
    return;
  }

  const industryRecovered = budget * INDUSTRY_RATE;
  const tcRecovered = budget * TECHCOLLECT_RATE;

  const additional = tcRecovered - industryRecovered;

  const perUnitPerMonth = additional / units / 12;

  document.getElementById('results').innerHTML = `
    <div class="result">
      <div class="result-label">Additional Annual Revenue</div>
      <div class="result-value">$${format(additional)}</div>
    </div>

    <div class="result">
      <div class="result-label">Revenue Per Unit / Month</div>
      <div class="result-value">$${perUnitPerMonth.toFixed(2)}</div>
    </div>

    <div class="result">
      <div class="result-label">Industry Recovery (48%)</div>
      <div class="result-value">$${format(industryRecovered)}</div>
    </div>

    <div class="result">
      <div class="result-label">TechCollect Recovery (90%)</div>
      <div class="result-value">$${format(tcRecovered)}</div>
    </div>
  `;
}

function format(num) {
  return num.toLocaleString();
}
</script>

</body>
</html>
